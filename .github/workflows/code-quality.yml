name: Code Quality Checks

on:
  push:
  pull_request:

jobs:
  lint-and-format:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # Server checks
      - name: Install Server dependencies
        run: npm install
        working-directory: ./Server

      - name: Run Server lint
        run: npm run lint
        working-directory: ./Server

      - name: Check Server formatting
        run: npm run format:check
        working-directory: ./Server

      # Client checks
      - name: Install Client dependencies
        run: npm install
        working-directory: ./Client

      - name: Run Client lint
        run: npm run lint
        working-directory: ./Client

      - name: Check Client formatting
        run: npm run format:check
        working-directory: ./Client

  test:
    runs-on: ubuntu-latest
    needs: lint-and-format

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install Server dependencies
        run: npm install
        working-directory: ./Server

      - name: Run Server tests with coverage
        run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov
        working-directory: ./Server
        env:
          JWT_SECRET: ci-jwt-secret-value-that-is-long-enough-here
          REFRESH_SECRET: ci-refresh-secret-value-that-is-long-enough

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: Server/coverage/lcov-report/
          retention-days: 14

  # Fail the workflow if any checks fail
  results:
    runs-on: ubuntu-latest
    needs: [lint-and-format, test]
    if: always()
    steps:
      - name: Check workflow status
        run: |
          if [ "${{ needs.lint-and-format.result }}" != "success" ] || [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ Code quality checks failed!"
            exit 1
          else
            echo "✅ All code quality checks passed!"
          fi

