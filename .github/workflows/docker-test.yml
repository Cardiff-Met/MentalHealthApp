name: Docker Build & Test

on:
  push:
  pull_request:

jobs:
  docker-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env file with secrets
        run: |
          mkdir -p server
          echo "PORT=3000" >> server/.env
          echo "CLIENT_URL=http://localhost:5173" >> server/.env
          echo "DB_HOST=db" >> server/.env
          echo "DB_PORT=3306" >> server/.env
          echo "DB_USER=root" >> server/.env
          echo "DB_PASSWORD=root1234" >> server/.env
          echo "DB_NAME=mental_health_app" >> server/.env
          echo "JWT_SECRET=test-jwt-secret-for-ci" >> server/.env
          echo "REFRESH_SECRET=test-refresh-secret-for-ci" >> server/.env

      - name: Build Docker images
        run: docker compose build

      - name: Start Docker containers
        run: docker compose up -d

      - name: Wait for database to be ready
        run: |
          echo "Waiting for database to be ready..."
          for i in {1..30}; do
            if docker compose exec -T db mysqladmin ping -h localhost -u root -proot1234 --silent 2>/dev/null; then
              echo "✅ Database is ready!"
              exit 0
            fi
            echo "Waiting for database... ($i/30)"
            sleep 3
          done
          echo "❌ Database did not become ready in time"
          docker compose logs db
          exit 1

      - name: Wait for server to be ready
        run: |
          echo "Waiting for server to be ready..."
          for i in {1..30}; do
            if curl -sf http://localhost:3000/health; then
              echo "✅ Server is ready!"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 3
          done
          echo "❌ Server did not become ready in time"
          docker compose logs server
          exit 1

      - name: Check container status
        run: |
          echo "=== Container Status ==="
          docker compose ps
          echo ""
          echo "=== Database Logs ==="
          docker compose logs db | tail -20
          echo ""
          echo "=== Server Logs ==="
          docker compose logs server | tail -20

      - name: Test health endpoint
        run: |
          response=$(curl -s http://localhost:3000/health)
          echo "Response: $response"
          if echo "$response" | grep -q "ok"; then
            echo "✅ Health check passed"
          else
            echo "❌ Health check failed"
            exit 1
          fi

      - name: Test register endpoint
        run: |
          response=$(curl -s -X POST http://localhost:3000/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"ci-test@test.com","password":"password123"}')
          echo "Response: $response"
          if echo "$response" | grep -q "accessToken"; then
            echo "✅ Register endpoint passed"
          else
            echo "❌ Register endpoint failed"
            exit 1
          fi

      - name: Test login endpoint
        run: |
          response=$(curl -s -X POST http://localhost:3000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"ci-test@test.com","password":"password123"}')
          echo "Response: $response"
          if echo "$response" | grep -q "accessToken"; then
            echo "✅ Login endpoint passed"
          else
            echo "❌ Login endpoint failed"
            exit 1
          fi

      - name: Verify all containers running
        run: |
          if [ "$(docker compose ps -q | wc -l)" -lt "2" ]; then
            echo "❌ Not all containers are running!"
            docker compose ps
            exit 1
          else
            echo "✅ All containers running successfully"
          fi

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v
          rm -f server/.env