services:
  db:
    image: mysql:8.0
    container_name: mental-health-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: mental_health_app
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./Server/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot1234"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  server:
    build: ./Server
    container_name: mental-health-server
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./Server/.env
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data: